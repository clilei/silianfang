<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>四连方拼图 - 五形挑战</title>
    <!-- TailwindCSS & Font Awesome CDN -->
    <script src="https://data.aix101.com/cdn/npm/@tailwindcss/3.4.17.js"></script>
    <link rel="stylesheet" href="https://data.aix101.com/cdn/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eduBlue: '#4285F4', eduGreen: '#34A853',
                        eduYellow: '#FBBC05', eduRed: '#EA4335',
                        eduBg: '#F5F7FB', cardBg: '#FFFFFF',
                    },
                    boxShadow: { 'edu': '0 10px 25px -5px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        /* 移动端优化：保留滚动，拖拽时智能防滚动 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
            background-color: #F5F7FB; 
            overscroll-behavior: none;  /* 防下拉刷新 */
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
        }
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #eef2f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 画布容器支持滚动 (手机看大画板) */
        #board-wrapper {
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        
        /* 网格画布背景 */
        #board-container {
            position: relative;
            background-color: #ffffff;
            background-image: 
                linear-gradient(to right, #E2E8F0 1px, transparent 1px),
                linear-gradient(to bottom, #E2E8F0 1px, transparent 1px);
            border: 2px solid #CBD5E1;
            border-radius: 12px;
            overflow: visible;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* 目标虚线框 */
        .target-box {
            position: absolute;
            border: 4px dashed #FBBC05;
            background-color: rgba(251, 188, 5, 0.08);
            border-radius: 10px;
            pointer-events: none;
            z-index: 10;
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
        }
        .target-box.success { 
            border-color: #34A853; 
            background-color: rgba(52, 168, 83, 0.15);
            box-shadow: 0 0 0 2px rgba(52,168,83,0.3);
        }

        /* 拼块样式 - 触控优化 */
        .tetromino { 
            position: absolute; 
            cursor: grab; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); 
            transition: transform 0.05s linear;
            touch-action: none;   /* 拖拽时禁止页面滚动，更跟手 */
        }
        .tetromino:active { 
            cursor: grabbing; 
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3)); 
            z-index: 1000 !important; 
        }
        .tetromino.selected { 
            filter: drop-shadow(0 0 12px rgba(66, 133, 244, 0.7)); 
            z-index: 90; 
        }
        .block-cell { 
            position: absolute; 
            border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 6px; 
            box-sizing: border-box; 
            pointer-events: none;
        }
        .block-inner { 
            width: 100%; 
            height: 100%; 
            border-radius: 5px; 
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.5), inset -2px -2px 4px rgba(0,0,0,0.1); 
            pointer-events: none;
        }

        /* 浮动操作菜单 (大按钮，手指友好) */
        .action-menu {
            position: absolute;
            display: none;
            gap: 12px;
            z-index: 200;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            padding: 8px 16px;
            border-radius: 56px;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.25);
            transform: translate(-50%, -110%);
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .action-menu.show { 
            display: flex; 
            animation: popIn 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2); 
        }
        .action-btn { 
            width: 52px; 
            height: 52px; 
            border-radius: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            cursor: pointer; 
            transition: all 0.15s;
            touch-action: manipulation;
        }
        .btn-rotate { background-color: #EBF2FF; color: #4285F4; } 
        .btn-rotate:active { background-color: #4285F4; color: white; transform: scale(0.94); }
        .btn-flip { background-color: #F0FDF4; color: #34A853; } 
        .btn-flip:active { background-color: #34A853; color: white; transform: scale(0.94); }
        .btn-delete { background-color: #FEF2F2; color: #EA4335; } 
        .btn-delete:active { background-color: #EA4335; color: white; transform: scale(0.94); }

        @keyframes popIn {
            0% { transform: translate(-50%, -80%) scale(0.7); opacity: 0; }
            100% { transform: translate(-50%, -110%) scale(1); opacity: 1; }
        }
        
        /* 零件库卡片风格 */
        .source-card {
            transition: all 0.1s ease;
            touch-action: manipulation;
            background: #fafcff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .source-card:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        
        /* Toast提示 */
        #toast-container { pointer-events: none; }
        .toast-item {
            transform: translateY(1.2rem);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        .toast-item.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 按钮点击反馈 */
        button, .tab-btn {
            touch-action: manipulation;
            transition: all 0.1s;
        }
        button:active, .tab-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-3 md:p-4 overflow-hidden">

    <!-- 顶部控制栏 紧凑但功能完整 -->
    <header class="w-full bg-cardBg rounded-2xl shadow-edu p-3 flex flex-wrap items-center justify-between gap-2 flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-eduYellow text-white rounded-xl flex items-center justify-center text-xl shadow-md">
                <i class="fa-solid fa-cubes"></i>
            </div>
            <div>
                <h1 class="text-md md:text-xl font-bold text-gray-800">四连方·五形拼图</h1>
                <p class="text-[10px] text-gray-500 leading-tight">拖拽方块 | 点击旋转/翻转</p>
            </div>
        </div>
        
        <div class="flex flex-wrap items-center gap-2 justify-end">
            <div class="bg-gray-100 p-1 rounded-xl flex flex-wrap text-xs font-bold gap-1">
                <button onclick="setChallenge('none')" id="tab-none" class="tab-btn px-3 py-1.5 rounded-lg bg-white text-eduBlue shadow-sm">自由</button>
                <button onclick="setChallenge('square')" id="tab-square" class="tab-btn px-3 py-1.5 rounded-lg text-gray-500">4x4</button>
                <button onclick="setChallenge('rect')" id="tab-rect" class="tab-btn px-3 py-1.5 rounded-lg text-gray-500">5x4</button>
                <button onclick="setChallenge('threeXeight')" id="tab-3x8" class="tab-btn px-3 py-1.5 rounded-lg text-gray-500">3x8</button>
            </div>
            <button onclick="clearBoard()" class="px-3 py-1.5 bg-gray-100 text-gray-600 font-bold rounded-xl active:bg-gray-200 flex items-center gap-1 text-sm">
                <i class="fa-solid fa-trash-can text-xs"></i> 清空
            </button>
        </div>
    </header>

    <!-- 主区域 拼图区 + 零件库 -->
    <main class="w-full flex-1 mt-3 flex flex-col lg:flex-row gap-3 overflow-hidden">
        <!-- 画布滚动区 -->
        <div class="flex-1 bg-white rounded-2xl shadow-edu p-2 flex items-center justify-center relative" id="board-wrapper">
            <div id="board-container" class="relative" style="margin: auto;">
                <div id="target-area" class="target-box hidden"></div>
            </div>
            <div id="action-menu" class="action-menu">
                <div class="action-btn btn-rotate" onclick="handleAction('rotate')" title="顺时针旋转"><i class="fa-solid fa-rotate-right"></i></div>
                <div class="action-btn btn-flip" onclick="handleAction('flip')" title="水平翻转"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
                <div class="action-btn btn-delete" onclick="handleAction('delete')" title="删除"><i class="fa-solid fa-trash-can"></i></div>
            </div>
        </div>

        <!-- 零件库: 仅保留五种形状 I, O, T, Z, L -->
        <div class="w-full lg:w-80 bg-white rounded-2xl shadow-edu p-3 flex flex-col flex-shrink-0">
            <h2 class="font-bold text-gray-700 text-base mb-2 flex items-center gap-2 border-b pb-2">
                <i class="fa-solid fa-puzzle-piece text-eduBlue"></i> 零件库 (5种形状)
                <span class="text-[10px] text-gray-400 ml-auto">拖拽使用 · 无限复制</span>
            </h2>
            <div id="source-library" class="flex-1 overflow-y-auto overflow-x-hidden flex flex-row flex-wrap justify-center items-center gap-4 py-2" style="min-height: 130px;">
                <!-- 动态生成: 一字型I, 田字形O, T字形, Z字形, L字形 -->
            </div>
            <div class="text-[10px] text-center text-gray-400 mt-2 pt-1 border-t">✨ 点击画布上的方块 → 旋转/翻转/删除</div>
        </div>
    </main>

    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>
    <canvas id="confetti-canvas" class="fixed inset-0 w-full h-full pointer-events-none z-50" style="display: none;"></canvas>

    <script>
        // ======================== 核心配置 ========================
        const CELL_SIZE = 46;          // 方块像素 (适合手指触摸)
        const BOARD_COLS = 14;         // 14列足够容纳最大挑战(3x8 / 5x4)
        const BOARD_ROWS = 12;         // 12行
        
        // ***** 仅保留五种四连方: I, O, T, Z, L *****
        const SHAPES = {
            'I': { color: '#06b6d4', matrix: [[1,1,1,1]] },                     // 一字型
            'O': { color: '#fbbf24', matrix: [[1,1],[1,1]] },                   // 田字型
            'T': { color: '#a855f7', matrix: [[1,1,1],[0,1,0]] },               // T型
            'Z': { color: '#22c55e', matrix: [[0,1,1],[1,1,0]] },               // Z型
            'L': { color: '#f97316', matrix: [[1,1,1],[1,0,0]] }                // L型 (保留经典方向)
        };
        
        let currentChallenge = 'none';      // 'none', 'square', 'rect', 'threeXeight'
        let targetRect = null;
        const boardEl = document.getElementById('board-container');
        const targetBoxEl = document.getElementById('target-area');
        const actionMenu = document.getElementById('action-menu');
        
        let shapesOnBoard = [];      // 画布上所有形状对象
        let selectedShape = null;
        let draggingShape = null;
        let isCloning = false;
        let dragOffset = { x: 0, y: 0 };
        let startGridPos = { col: 0, row: 0 };
        
        // ----- 获取事件坐标(触摸/鼠标) -----
        function getEventPos(e) {
            if (e.type.includes('touch') && e.touches.length) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.type.includes('touch') && e.changedTouches) {
                return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }
        
        // 创建形状DOM (纯视觉，不绑定逻辑)
        function createMatrixDom(matrix, color, cellSize = CELL_SIZE) {
            const container = document.createElement('div');
            container.style.position = 'relative';
            container.style.width = `${matrix[0].length * cellSize}px`;
            container.style.height = `${matrix.length * cellSize}px`;
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] === 1) {
                        const cell = document.createElement('div');
                        cell.className = 'block-cell';
                        cell.style.width = `${cellSize}px`;
                        cell.style.height = `${cellSize}px`;
                        cell.style.left = `${c * cellSize}px`;
                        cell.style.top = `${r * cellSize}px`;
                        cell.style.backgroundColor = color;
                        cell.innerHTML = '<div class="block-inner"></div>';
                        container.appendChild(cell);
                    }
                }
            }
            return container;
        }
        
        // 更新形状DOM的位置和矩阵显示
        function updateShapeDom(shape) {
            shape.dom.innerHTML = '';
            const newInner = createMatrixDom(shape.matrix, shape.color, CELL_SIZE);
            while (newInner.firstChild) shape.dom.appendChild(newInner.firstChild);
            shape.dom.style.width = `${shape.matrix[0].length * CELL_SIZE}px`;
            shape.dom.style.height = `${shape.matrix.length * CELL_SIZE}px`;
            shape.dom.style.left = `${shape.col * CELL_SIZE}px`;
            shape.dom.style.top = `${shape.row * CELL_SIZE}px`;
        }
        
        // 获取形状占据的所有格子
        function getOccupiedCells(matrix, col, row) {
            const cells = [];
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] === 1) cells.push({ x: col + c, y: row + r });
                }
            }
            return cells;
        }
        
        // 位置合法性 (边界 + 形状间重叠)
        function isPositionValid(matrix, col, row, ignoreId = null) {
            const rows = matrix.length, cols = matrix[0].length;
            if (col < 0 || row < 0 || col + cols > BOARD_COLS || row + rows > BOARD_ROWS) return false;
            const currentCells = getOccupiedCells(matrix, col, row);
            for (const shape of shapesOnBoard) {
                if (shape.id === ignoreId) continue;
                const otherCells = getOccupiedCells(shape.matrix, shape.col, shape.row);
                if (currentCells.some(cell => otherCells.some(oc => oc.x === cell.x && oc.y === cell.y))) return false;
            }
            return true;
        }
        
        // ----- 胜利检测 (完全填满目标区域) -----
        function checkWin() {
            if (currentChallenge === 'none' || !targetRect) return;
            const targetCells = [];
            for (let r = 0; r < targetRect.h; r++) {
                for (let c = 0; c < targetRect.w; c++) {
                    targetCells.push({ x: targetRect.col + c, y: targetRect.row + r });
                }
            }
            let allFilledCells = [];
            shapesOnBoard.forEach(shape => {
                const cells = getOccupiedCells(shape.matrix, shape.col, shape.row);
                const insideTarget = cells.every(c => 
                    c.x >= targetRect.col && c.x < targetRect.col + targetRect.w &&
                    c.y >= targetRect.row && c.y < targetRect.row + targetRect.h
                );
                if (insideTarget) allFilledCells.push(...cells);
            });
            // 去重并比较数量 (快速检测是否完全覆盖)
            const uniqueFilled = new Set(allFilledCells.map(c => `${c.x},${c.y}`));
            if (uniqueFilled.size === targetRect.w * targetRect.h) {
                if (!targetBoxEl.classList.contains('success')) {
                    targetBoxEl.classList.add('success');
                    triggerWinEffect();
                }
            } else {
                targetBoxEl.classList.remove('success');
            }
        }
        
        // 胜利动画 (手机友好彩带)
        function triggerWinEffect() {
            showToast('🎉 拼图成功！挑战达成！ 🎉', 'success');
            const canvas = document.getElementById('confetti-canvas');
            canvas.style.display = 'block';
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#4285F4', '#34A853', '#FBBC05', '#EA4335', '#a855f7', '#06b6d4'];
            for (let i = 0; i < 130; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    r: Math.random() * 8 + 4,
                    dx: (Math.random() - 0.5) * 16, dy: (Math.random() - 0.8) * -22 - 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                });
            }
            let animId;
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.dy += 0.28;
                    p.y += p.dy;
                    p.x += p.dx;
                    if (p.y < canvas.height + 100) active = true;
                    ctx.beginPath();
                    ctx.fillStyle = p.color;
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                if (active) animId = requestAnimationFrame(render);
                else { cancelAnimationFrame(animId); canvas.style.display = 'none'; ctx.clearRect(0, 0, canvas.width, canvas.height); }
            }
            render();
            setTimeout(() => { if (animId) cancelAnimationFrame(animId); canvas.style.display = 'none'; }, 3800);
        }
        
        // 提示浮层
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-eduGreen' : (type === 'error' ? 'bg-eduRed' : 'bg-gray-800');
            toast.className = `toast-item ${bg} text-white px-5 py-2.5 rounded-full shadow-lg font-medium flex items-center gap-2 text-sm`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-hand-peace'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }
        
        // 取消选中
        function deselectShape() {
            if (selectedShape) selectedShape.dom.classList.remove('selected');
            selectedShape = null;
            actionMenu.classList.remove('show');
        }
        
        // 选中形状并显示操作菜单
        function selectShape(shapeObj) {
            deselectShape();
            selectedShape = shapeObj;
            shapeObj.dom.classList.add('selected');
            const w = shapeObj.matrix[0].length * CELL_SIZE;
            const x = shapeObj.col * CELL_SIZE + w / 2;
            const y = shapeObj.row * CELL_SIZE;
            actionMenu.style.left = `${x}px`;
            actionMenu.style.top = `${y}px`;
            actionMenu.classList.add('show');
        }
        
        // 旋转/翻转/删除处理
        function handleAction(action) {
            if (!selectedShape) return;
            const shape = selectedShape;
            const oldMatrix = shape.matrix;
            const oldCol = shape.col, oldRow = shape.row;
            
            if (action === 'delete') {
                shape.dom.remove();
                shapesOnBoard = shapesOnBoard.filter(s => s !== shape);
                deselectShape();
                checkWin();
                showToast('已移除拼块', 'info');
                return;
            }
            
            if (action === 'rotate') {
                const rows = oldMatrix.length, cols = oldMatrix[0].length;
                const newMatrix = [];
                for (let c = 0; c < cols; c++) {
                    newMatrix[c] = [];
                    for (let r = 0; r < rows; r++) {
                        newMatrix[c][r] = oldMatrix[rows - 1 - r][c];
                    }
                }
                shape.matrix = newMatrix;
                shape.col = oldCol + Math.floor((cols - rows) / 2);
                shape.row = oldRow + Math.floor((rows - cols) / 2);
            } else if (action === 'flip') {
                shape.matrix = oldMatrix.map(row => [...row].reverse());
            }
            
            if (isPositionValid(shape.matrix, shape.col, shape.row, shape.id)) {
                updateShapeDom(shape);
                selectShape(shape);
                checkWin();
            } else {
                shape.matrix = oldMatrix;
                shape.col = oldCol;
                shape.row = oldRow;
                showToast('空间不足，无法变换', 'error');
            }
        }
        
        // 清空画板
        function clearBoard() {
            shapesOnBoard.forEach(obj => obj.dom.remove());
            shapesOnBoard = [];
            deselectShape();
            targetBoxEl.classList.remove('success');
            showToast('画布已清空', 'success');
            checkWin();
        }
        
        // 设置挑战模式 (自由 / 4x4 / 5x4 / 3x8)
        function setChallenge(type) {
            currentChallenge = type;
            // 更新tab按钮样式
            ['none', 'square', 'rect', 'threeXeight'].forEach(t => {
                const btn = document.getElementById(`tab-${t === 'threeXeight' ? '3x8' : t}`);
                if (btn) {
                    if ((type === 'none' && t === 'none') ||
                        (type === 'square' && t === 'square') ||
                        (type === 'rect' && t === 'rect') ||
                        (type === 'threeXeight' && t === 'threeXeight')) {
                        btn.className = 'tab-btn px-3 py-1.5 rounded-lg bg-white text-eduBlue shadow-sm font-bold';
                    } else {
                        btn.className = 'tab-btn px-3 py-1.5 rounded-lg text-gray-500';
                    }
                }
            });
            
            targetBoxEl.classList.remove('success');
            if (type === 'none') {
                targetBoxEl.classList.add('hidden');
                targetRect = null;
            } else {
                targetBoxEl.classList.remove('hidden');
                let w, h;
                if (type === 'square') { w = 4; h = 4; }
                else if (type === 'rect') { w = 5; h = 4; }
                else if (type === 'threeXeight') { w = 8; h = 3; }
                else return;
                
                const startCol = Math.floor((BOARD_COLS - w) / 2);
                const startRow = Math.floor((BOARD_ROWS - h) / 2);
                targetRect = { col: startCol, row: startRow, w, h };
                targetBoxEl.style.width = `${w * CELL_SIZE}px`;
                targetBoxEl.style.height = `${h * CELL_SIZE}px`;
                targetBoxEl.style.left = `${startCol * CELL_SIZE}px`;
                targetBoxEl.style.top = `${startRow * CELL_SIZE}px`;
            }
            checkWin(); // 重新判断当前拼图是否满足新挑战
        }
        
        // ---------- 拖拽引擎 (移动端完美适配) ----------
        function startDrag(e, type, fromLibrary = false, existingShape = null) {
            if (e.cancelable) e.preventDefault();
            deselectShape();
            let dom, matrix, color, id;
            if (fromLibrary) {
                isCloning = true;
                matrix = SHAPES[type].matrix.map(row => [...row]);
                color = SHAPES[type].color;
                id = 'shape_' + Date.now() + '_' + Math.random();
                dom = document.createElement('div');
                dom.className = 'tetromino';
                dom.style.position = 'absolute';
                const innerDom = createMatrixDom(matrix, color, CELL_SIZE);
                while (innerDom.firstChild) dom.appendChild(innerDom.firstChild);
                dom.style.width = `${matrix[0].length * CELL_SIZE}px`;
                dom.style.height = `${matrix.length * CELL_SIZE}px`;
                boardEl.appendChild(dom);
                draggingShape = { id, type, matrix, color, dom, col: 0, row: 0 };
            } else {
                isCloning = false;
                draggingShape = existingShape;
                dom = draggingShape.dom;
                matrix = draggingShape.matrix;
                startGridPos = { col: draggingShape.col, row: draggingShape.row };
                dom.classList.add('z-50');
            }
            const pos = getEventPos(e);
            const rect = dom.getBoundingClientRect();
            if (fromLibrary) {
                const w = matrix[0].length * CELL_SIZE;
                const h = matrix.length * CELL_SIZE;
                dragOffset = { x: w / 2, y: h / 2 };
                dom.style.left = `-100px`;
                dom.style.top = `-100px`;
            } else {
                dragOffset = { x: pos.x - rect.left, y: pos.y - rect.top };
            }
            // 绑定全局事件
            document.addEventListener('mousemove', onGlobalDrag);
            document.addEventListener('touchmove', onGlobalDrag, { passive: false });
            document.addEventListener('mouseup', endGlobalDrag);
            document.addEventListener('touchend', endGlobalDrag);
            document.addEventListener('touchcancel', endGlobalDrag);
            onGlobalDrag(e);
        }
        
        function onGlobalDrag(e) {
            if (!draggingShape) return;
            if (e.type === 'touchmove') e.preventDefault();  // 拖拽时阻止滚动
            const pos = getEventPos(e);
            const boardRect = boardEl.getBoundingClientRect();
            let pxX = pos.x - boardRect.left - dragOffset.x;
            let pxY = pos.y - boardRect.top - dragOffset.y;
            draggingShape.dom.style.left = `${pxX}px`;
            draggingShape.dom.style.top = `${pxY}px`;
            let snapCol = Math.round(pxX / CELL_SIZE);
            let snapRow = Math.round(pxY / CELL_SIZE);
            draggingShape.tempCol = snapCol;
            draggingShape.tempRow = snapRow;
        }
        
        function endGlobalDrag(e) {
            if (!draggingShape) return;
            document.removeEventListener('mousemove', onGlobalDrag);
            document.removeEventListener('touchmove', onGlobalDrag);
            document.removeEventListener('mouseup', endGlobalDrag);
            document.removeEventListener('touchend', endGlobalDrag);
            document.removeEventListener('touchcancel', endGlobalDrag);
            const col = draggingShape.tempCol;
            const row = draggingShape.tempRow;
            draggingShape.dom.classList.remove('z-50');
            if (isPositionValid(draggingShape.matrix, col, row, draggingShape.id)) {
                draggingShape.col = col;
                draggingShape.row = row;
                draggingShape.dom.style.left = `${col * CELL_SIZE}px`;
                draggingShape.dom.style.top = `${row * CELL_SIZE}px`;
                if (isCloning) {
                    shapesOnBoard.push(draggingShape);
                    const newShape = draggingShape;
                    // 为新形状绑定选中 & 二次拖拽事件
                    const handleDown = (ev) => {
                        ev.stopPropagation();
                        if (ev.cancelable) ev.preventDefault();
                        newShape.clickTimer = Date.now();
                        startDrag(ev, newShape.type, false, newShape);
                    };
                    const handleUp = (ev) => {
                        if (Date.now() - (newShape.clickTimer || 0) < 200) {
                            selectShape(newShape);
                        }
                    };
                    newShape.dom.addEventListener('mousedown', handleDown);
                    newShape.dom.addEventListener('touchstart', handleDown, { passive: false });
                    newShape.dom.addEventListener('mouseup', handleUp);
                    newShape.dom.addEventListener('touchend', handleUp);
                }
                checkWin();
            } else {
                if (isCloning) {
                    draggingShape.dom.remove();
                } else {
                    showToast('位置重叠或超出边界', 'error');
                    draggingShape.col = startGridPos.col;
                    draggingShape.row = startGridPos.row;
                    draggingShape.dom.style.transition = 'left 0.12s, top 0.12s';
                    draggingShape.dom.style.left = `${startGridPos.col * CELL_SIZE}px`;
                    draggingShape.dom.style.top = `${startGridPos.row * CELL_SIZE}px`;
                    setTimeout(() => draggingShape.dom.style.transition = '', 150);
                }
            }
            draggingShape = null;
        }
        
        // ---------- 初始化: 生成零件库 (仅I, O, T, Z, L) + 画板尺寸 ----------
        function init() {
            boardEl.style.width = `${BOARD_COLS * CELL_SIZE}px`;
            boardEl.style.height = `${BOARD_ROWS * CELL_SIZE}px`;
            boardEl.style.backgroundSize = `${CELL_SIZE}px ${CELL_SIZE}px`;
            
            const library = document.getElementById('source-library');
            library.innerHTML = '';
            const shapeKeys = ['I', 'O', 'T', 'Z', 'L'];   // 五种经典形状
            shapeKeys.forEach(key => {
                const shapeDef = SHAPES[key];
                const card = document.createElement('div');
                card.className = 'source-card relative cursor-grab bg-gray-50 rounded-xl p-1 shadow-sm flex items-center justify-center';
                const matrix = shapeDef.matrix;
                const previewSize = CELL_SIZE * 0.7;
                card.style.width = `${matrix[0].length * previewSize + 12}px`;
                card.style.height = `${matrix.length * previewSize + 12}px`;
                const miniDom = createMatrixDom(matrix, shapeDef.color, previewSize);
                card.appendChild(miniDom);
                card.addEventListener('mousedown', (e) => startDrag(e, key, true));
                card.addEventListener('touchstart', (e) => startDrag(e, key, true), { passive: false });
                library.appendChild(card);
            });
            
            // 点击画布空白取消选中
            boardEl.addEventListener('mousedown', (e) => { if (e.target === boardEl) deselectShape(); });
            boardEl.addEventListener('touchstart', (e) => { if (e.target === boardEl) deselectShape(); });
            setChallenge('none');
        }
        
        // 挂载全局方法
        window.setChallenge = setChallenge;
        window.clearBoard = clearBoard;
        window.handleAction = handleAction;
        window.onload = init;
    </script>
</body>
